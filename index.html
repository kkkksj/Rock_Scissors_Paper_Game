<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5위바위보</title>

  <!-- MediaPipe CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

  <!-- 스타일시트 -->
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
<div id="app">

  <!-- ── 시작 화면 (모드 선택) ── -->
  <div id="setup-screen">

    <!-- 배경 떠다니는 이모지 -->
    <span class="bg-emoji" style="top:6%;  left:4%;   animation-duration:7s;">✊</span>
    <span class="bg-emoji" style="top:12%; right:7%;  animation-duration:9s;  animation-delay:-2s;">✌️</span>
    <span class="bg-emoji" style="top:50%; left:2%;   animation-duration:8s;  animation-delay:-4s;">🖐</span>
    <span class="bg-emoji" style="top:70%; right:4%;  animation-duration:10s; animation-delay:-1s;">👽</span>
    <span class="bg-emoji" style="bottom:8%;  left:8%;  animation-duration:7.5s; animation-delay:-3s;">🦎</span>
    <span class="bg-emoji" style="bottom:15%; right:10%; font-size:5rem; animation-duration:11s; animation-delay:-5s; opacity:0.05;">✊</span>
    <span class="bg-emoji" style="top:32%; left:50%; font-size:6rem; animation-duration:13s; animation-delay:-6s; opacity:0.04;">🖐</span>

    <!-- 이모지 쇼케이스 -->
    <div class="emoji-showcase">
      <span class="sh-emoji">✊</span>
      <span class="sh-emoji">✌️</span>
      <span class="sh-emoji">🖐</span>
      <span class="sh-emoji">👽</span>
      <span class="sh-emoji">🦎</span>
    </div>

    <!-- 제목 -->
    <div class="setup-title"><span class="num5">5</span>위바위보</div>
    <div class="setup-sub">✦ 웹캠으로 손 모양을 인식합니다 ✦</div>

    <!-- 구분선 -->
    <div class="setup-divider"></div>

    <!-- 모드 카드 -->
    <div class="mode-cards">
      <button class="mode-card" onclick="startGame(1,1)">
        <div class="mc-icon">⚡</div>
        <div class="mc-name">단판</div>
        <div class="mc-desc">1회 승부</div>
      </button>
      <button class="mode-card" onclick="startGame(3,2)">
        <div class="mc-icon">🏆</div>
        <div class="mc-name">3판 2선승</div>
        <div class="mc-desc">2승 먼저</div>
      </button>
      <button class="mode-card" onclick="startGame(5,3)">
        <div class="mc-icon">👑</div>
        <div class="mc-name">5판 3선승</div>
        <div class="mc-desc">3승 먼저</div>
      </button>
    </div>

  </div>

  <!-- ── 게임 화면 ── -->
  <div id="game-screen">

    <!-- 헤더 -->
    <div class="game-header">
      <div class="hdr-title">✊ <span class="num5">5</span>위바위보</div>
      <div class="hdr-round" id="round-text">라운드 -</div>
      <div class="hdr-right">
        <div class="hdr-score" id="score-text">나 0 : 0 컴퓨터</div>
        <button class="quit-btn" onclick="quitGame()">그만하기</button>
      </div>
    </div>

    <!-- 라운드 결과 -->
    <div class="result-area">
      <div id="result-text" class="result-wait">- - -</div>
      <div id="round-desc"></div>
    </div>

    <!-- 메인: 웹캠 vs 컴퓨터 -->
    <div class="game-main">

      <!-- 유저 사이드 -->
      <div class="user-side">
        <div class="gesture-label">
          <span class="g-icon" id="user-g-icon">❓</span>
          <span class="g-name" id="user-g-name">인식 대기</span>
        </div>
        <div id="video-container">
          <video id="input-video" autoplay playsinline muted></video>
          <canvas id="output-canvas"></canvas>
          <div id="capture-status">손을 보여주세요</div>
          <div id="countdown-overlay">
            <div id="countdown-number">3</div>
          </div>
        </div>
      </div>

      <!-- VS 구분자 -->
      <div class="vs-divider">VS</div>

      <!-- 컴퓨터 사이드 -->
      <div class="cpu-side">
        <div class="gesture-label">
          <span class="g-icon" id="cpu-g-icon">❓</span>
          <span class="g-name" id="cpu-g-name">컴퓨터</span>
        </div>
        <div class="cpu-icon-box" id="cpu-icon-big">❓</div>
      </div>

    </div>
  </div>

</div>

<!-- ── 게임 종료 오버레이 ── -->
<div id="end-overlay">
  <div id="end-card">
    <div id="end-title"></div>
    <div id="end-score"></div>
    <div id="end-reason"></div>
    <button class="action-btn" onclick="resetToSetup()">다시 하기</button>
  </div>
</div>

<!-- 게임 스크립트 (DOM 로드 후 실행되도록 body 하단에 배치) -->
<script src="./script.js"></script>
</body>
</html>
